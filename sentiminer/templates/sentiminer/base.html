{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentiMiner — Análisis Sentimental</title>
    <link rel="stylesheet" href="{% static 'sentiminer/css/tabler.min.css' %}">
    <script src="https://cdn.plot.ly/plotly-3.1.0.min.js"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { background: #f4f6fa; }
        .page-wrapper { min-height: 100vh; }
        .sentimiento-positivo { color: #2fb344; font-weight: 600; }
        .sentimiento-negativo { color: #d63939; font-weight: 600; }
        .sentimiento-neutro { color: #656d77; font-weight: 600; }
        .badge-positivo { background: #2fb344; color: #fff; }
        .badge-negativo { background: #d63939; color: #fff; }
        .badge-neutro { background: #656d77; color: #fff; }
        .card-status { transition: transform 0.2s; }
        .card-status:hover { transform: translateY(-2px); }
        .htmx-indicator { opacity: 0; transition: opacity 200ms ease-in; }
        .htmx-request .htmx-indicator { opacity: 1; }
        .htmx-request.htmx-indicator { opacity: 1; }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <header class="navbar navbar-expand-md navbar-light d-print-none">
            <div class="container-xl">
                <h1 class="navbar-brand mb-0">
                    <svg 
                        xmlns="http://www.w3.org/2000/svg" width="24" height="24" 
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" 
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" 
                        class="icon icon-tabler icons-tabler-outline icon-tabler-message-heart text-pink">
                        <path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M8 9h8" />
                        <path d="M8 13h3.5" /><path d="M10.48 19.512l-2.48 1.488v-3h-2a3 3 0 0 1 -3 -3v-8a3 3 0 0 1 3 -3h12a3 3 0 0 1 3 3v4" />
                        <path d="M18 22l3.35 -3.284a2.143 2.143 0 0 0 .005 -3.071a2.242 2.242 0 0 0 -3.129 -.006l-.224 .22l-.223 -.22a2.242 2.242 0 0 0 -3.128 -.006a2.143 2.143 0 0 0 -.006 3.071l3.355 3.296" />
                    </svg>
                    SentiMiner
                </h1>
            </div>
        </header>
        <div class="container-xl py-4">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert" x-data="{ show: true }" x-show="show" x-init="setTimeout(() => show = false, 5000)">
                        {{ message }}
                        <button type="button" class="btn-close" @click="show = false"></button>
                    </div>
                {% endfor %}
            {% endif %}
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
